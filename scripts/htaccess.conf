<IfModule mod_rewrite.c>
    <IfModule mod_negotiation.c>
        Options -MultiViews -Indexes
    </IfModule>

    RewriteEngine On

    # Handle Authorization Header
    RewriteCond %{HTTP:Authorization} .
    RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

    # Handle X-XSRF-Token Header
    RewriteCond %{HTTP:x-xsrf-token} .
    RewriteRule .* - [E=HTTP_X_XSRF_TOKEN:%{HTTP:X-XSRF-Token}]

    # Serve existing files/dirs/symlinks directly FIRST
    # (this lets /storage/... resolve via the symlink without hitting Laravel)
    RewriteCond %{REQUEST_FILENAME} -f [OR]
    RewriteCond %{REQUEST_FILENAME} -d [OR]
    RewriteCond %{REQUEST_FILENAME} -l
    RewriteRule ^ - [L]

    # Backend paths → Laravel front controller
    RewriteRule ^(api|admin|livewire|locale|filament|login|logout|broadcasting)(/.*)?$ laravel.php [L,QSA]

    # All other requests → React SPA
    RewriteRule ^ index.html [L]
</IfModule>
